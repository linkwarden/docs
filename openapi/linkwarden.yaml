openapi: 3.0.2
info:
  description: Linkwarden OpenAPI Documentation.
  version: 1.0.0
  title: API Introduction
  license:
    name: GNU Affero General Public License v3.0
    url: "https://www.gnu.org/licenses/agpl-3.0.html"
tags:
  - name: Archives
  - name: Auth
  - name: Avatar
  - name: Collections
  - name: Config
  - name: Dashboard
  - name: Highlights
  - name: Links
  - name: Logins
  - name: Migration
  - name: Preserved
  - name: Public
  - name: RSS
  - name: Session
  - name: Tags
  - name: Tokens
  - name: Favicon
  - name: Users
  - name: Worker
paths:
  /api/v1/archives/{linkId}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Archives
      summary: Retrieves an archive file by link ID
      parameters:
        - name: linkId
          in: path
          required: true
          description: The ID of the desired link
          schema:
            type: string
        - name: format
          in: query
          required: false
          description: |
            The numeric value corresponding to the format of the file being uploaded:
            - `0`: PNG
            - `1`: JPEG
            - `2`: PDF
            - `3`: Readability JSON
            - `4` Monolith HTML
          schema:
            type: integer
            enum:
              - 0 # PNG
              - 1 # JPEG
              - 2 # PDF
              - 3 # Readability JSON
              - 4 # Monolith HTML
        - name: preview
          in: query
          required: false
          description: Indicates whether to return a preview of the archive.
          schema:
            type: boolean
      responses:
        "200":
          description: Archive file retrieved successfully.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: The requested archive file was not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
      description: |
        Retrieves an archive file in the specified format.

        When `NEXT_PUBLIC_USER_CONTENT_DOMAIN` is configured, browser-style requests for monolith HTML (`format=4`) are rejected on this route unless a bearer token is provided. In that setup, monolith HTML should be loaded through `/api/v1/preserved/token` and `/api/v1/preserved/view` instead.
    post:
      security:
        - bearerAuth: []
      tags:
        - Archives
      summary: Uploads a file to an archive by link ID
      parameters:
        - name: linkId
          in: path
          required: true
          description: The ID of the desired link
          schema:
            type: integer
        - name: format
          in: query
          required: true
          description: |
            The numeric value corresponding to the format of the file being uploaded:
            - `0`: PNG
            - `1`: JPEG
            - `2`: PDF
            - `4`: Monolith HTML
          schema:
            type: integer
            enum:
              - 0 # PNG
              - 1 # JPEG
              - 2 # PDF
              - 4 # Monolith HTML
        - name: preview
          in: query
          required: false
          description: Indicates whether the uploaded file should be stored as the generated preview instead of the main archive file.
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (PNG, JPEG, PDF, or HTML).
              required:
                - file
      responses:
        "200":
          description: File successfully uploaded and processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      description: Uploads or replaces a client-side archive file for the specified link.
  /api/v1/archives:
    post:
      security:
        - bearerAuth: []
      tags:
        - Archives
      summary: Uploads a standalone archive and creates a new link
      parameters:
        - name: format
          in: query
          required: true
          description: |
            The numeric value corresponding to the format of the file being uploaded:
            - `0`: PNG
            - `1`: JPEG
            - `2`: PDF
            - `4`: Monolith HTML
          schema:
            type: integer
            enum:
              - 0 # PNG
              - 1 # JPEG
              - 2 # PDF
              - 4 # Monolith HTML
        - name: preview
          in: query
          required: false
          description: Indicates whether the uploaded file should be treated as a generated preview instead of the main archive file.
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (PNG, JPEG, PDF, or HTML).
                url:
                  type: string
                  format: uri
                  description: Optional source URL used to populate metadata for the newly created link.
              required:
                - file
      responses:
        "200":
          description: Archive file successfully uploaded and linked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/Link"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      description: Uploads an archive file, creates a new link for it, and stores it in the authenticated user's default collection.
  /api/v1/config:
    get:
      tags:
        - Config
      summary: Retrieves public runtime configuration
      responses:
        "200":
          description: Public runtime configuration retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/PublicConfig"
      description: Returns the public configuration values used by Linkwarden clients.
  /api/v1/preserved/token:
    get:
      tags:
        - Preserved
      summary: Creates a short-lived preserved format URL
      parameters:
        - name: linkId
          in: query
          required: true
          description: The ID of the link whose archived format should be accessed.
          schema:
            type: integer
        - name: format
          in: query
          required: false
          description: |
            The numeric value corresponding to the preserved format:
            - `0`: PNG
            - `1`: JPEG
            - `2`: PDF
            - `3`: Readability JSON
            - `4`: Monolith HTML
          schema:
            type: integer
            enum:
              - 0
              - 1
              - 2
              - 3
              - 4
      responses:
        "200":
          description: Signed preserved format URL created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/PreservedFormatUrl"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      description: |
        Returns a short-lived signed URL for loading an archived format from the configured user content domain.

        This route supports authenticated requests and can also work for public links if the archived item belongs to a public collection.
  /api/v1/preserved/view:
    get:
      tags:
        - Preserved
      summary: Streams an archived format from the user content domain
      parameters:
        - name: token
          in: query
          required: true
          description: The short-lived signed token returned by `/api/v1/preserved/token`.
          schema:
            type: string
        - name: download
          in: query
          required: false
          description: If set to `1`, the response is served as a file download.
          schema:
            type: string
            enum:
              - "1"
      responses:
        "200":
          description: Archived format streamed successfully.
          content:
            text/html:
              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      description: |
        Streams an archived format by validating a short-lived signed token.

        This route is intended to be served only on the hostname configured in `NEXT_PUBLIC_USER_CONTENT_DOMAIN`.
  /api/v1/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Sends a password reset email to the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: The email of the user requesting the password reset.
              required:
                - email
      responses:
        "200":
          description: Password reset email sent successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
  /api/v1/auth/reset-password:
    post:
      tags:
        - Auth
      summary: Resets the password for a user using a valid token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: The password reset token.
                password:
                  type: string
                  minLength: 8
                  description: The new password to set.
              required:
                - token
                - password
      responses:
        "200":
          description: Password has been reset successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verifies the user's email after they click a verification link
      parameters:
        - name: token
          in: query
          required: true
          description: The verification token sent to the user's email.
          schema:
            type: string
      responses:
        "200":
          description: Email verification successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/avatar/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Avatar
      summary: Retrieves the avatar of a user by their ID
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the user whose avatar is to be retrieved.
          schema:
            type: integer
      responses:
        "200":
          description: Avatar image successfully retrieved
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/collections:
    get:
      security:
        - bearerAuth: []
      summary: Get all collections
      operationId: getAllCollections
      tags:
        - Collections
      responses:
        "200":
          description: List of collections successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 3
                        name:
                          type: string
                          example: Health and Wellness
                        description:
                          type: string
                          example: Latest articles on health and wellness.
                        icon:
                          type: string
                          description: Acorn
                          nullable: true
                        iconWeight:
                          type: string
                          example: fill
                          nullable: true
                          enum:
                            - fill
                            - bold
                            - light
                            - regular
                            - duotone
                            - thin
                        color:
                          type: string
                          example: "#0ea5e9"
                        parentId:
                          type: integer
                          example: null
                          nullable: true
                        isPublic:
                          type: boolean
                          example: false
                        ownerId:
                          type: integer
                          example: 1
                        createdById:
                          type: integer
                          example: 2
                        createdAt:
                          type: string
                          format: date-time
                          example: "2024-12-02T00:40:22.295Z"
                        updatedAt:
                          type: string
                          format: date-time
                          example: "2024-12-02T00:40:22.295Z"
                        _count:
                          type: object
                          properties:
                            links:
                              type: integer
                              example: 3
                        parent:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                              example: 6
                            name:
                              type: string
                              example: New Collection
                        members:
                          type: array
                          items:
                            type: object
                            properties:
                              userId:
                                type: integer
                                example: 3
                              collectionId:
                                type: integer
                                example: 4
                              canCreate:
                                type: boolean
                                example: true
                              canUpdate:
                                type: boolean
                                example: true
                              canDelete:
                                type: boolean
                                example: true
                              createdAt:
                                type: string
                                format: date-time
                                example: "2024-12-02T05:50:22.680Z"
                              updatedAt:
                                type: string
                                format: date-time
                                example: "2024-12-02T05:50:22.680Z"
                              user:
                                type: object
                                properties:
                                  username:
                                    type: string
                                    example: user1
                                  name:
                                    type: string
                                    example: John Doe
                                  image:
                                    type: string
                                    example: null
                                    nullable: true

        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/collections/{id}:
    get:
      security:
        - bearerAuth: []
      summary: Get a collection by ID
      operationId: getCollectionById
      tags:
        - Collections
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the collection to retrieve.
          schema:
            type: integer
      responses:
        "200":
          description: Collection successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/Collection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      security:
        - bearerAuth: []
      summary: Create a new collection
      operationId: createCollection
      tags:
        - Collections
      requestBody:
        description: The details of the collection to create.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the collection.
                description:
                  type: string
                  description: The description of the collection.
                color:
                  type: string
                  description: The color of the collection.
                icon:
                  type: string
                  description: The icon of the collection.
                iconWeight:
                  type: string
                  description: The weight of the collection's icon.
                parentId:
                  type: integer
                  description: The ID of the parent collection, if applicable.
      responses:
        "200":
          description: Collection successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/Collection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      security:
        - bearerAuth: []
      summary: Update an existing collection by ID
      operationId: updateCollection
      tags:
        - Collections
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the collection to update.
          schema:
            type: integer
      requestBody:
        description: The updated collection data.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                color:
                  type: string
                icon:
                  type: string
                iconWeight:
                  type: string
                parentId:
                  type: integer
                isPublic:
                  type: boolean
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      userId:
                        type: integer
                      canCreate:
                        type: boolean
                      canUpdate:
                        type: boolean
                      canDelete:
                        type: boolean
      responses:
        "200":
          description: Collection successfully updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: "#/components/schemas/Collection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      security:
        - bearerAuth: []
      summary: Delete a collection by ID
      operationId: deleteCollectionById
      tags:
        - Collections
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the collection to delete.
          schema:
            type: integer
      responses:
        "200":
          description: Collection successfully deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: The deleted collection details.
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      description:
                        type: string
                      icon:
                        type: string
                        nullable: true
                      iconWeight:
                        type: string
                        nullable: true
                      color:
                        type: string
                      parentId:
                        type: integer
                        nullable: true
                      isPublic:
                        type: boolean
                      ownerId:
                        type: integer
                      createdById:
                        type: integer
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/dashboard:
    get:
      security:
        - bearerAuth: []
      summary: Get dashboard data (v1)
      description: Retrieves the dashboard data for the authenticated user.
      operationId: getDashboard
      tags:
        - Dashboard
      responses:
        "200":
          description: Dashboard data successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    description: List of resources with associated collections.
                    items:
                      $ref: "#/components/schemas/Link"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v2/dashboard:
    get:
      security:
        - bearerAuth: []
      summary: Get dashboard data (v2)
      description: Retrieves the dashboard data for the authenticated user.
      operationId: getDashboardV2
      tags:
        - Dashboard
      responses:
        "200":
          description: Dashboard data successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      links:
                        type: array
                        items:
                          $ref: "#/components/schemas/Link"
                      collectionLinks:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            $ref: "#/components/schemas/Link"
                      numberOfPinnedLinks:
                        type: integer
                        example: 0
                      numberOfTags:
                        type: integer
                        example: 0
                  message:
                    type: string
                    example: "Dashboard data fetched successfully."
                  success:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      security:
        - bearerAuth: []
      summary: Update dashboard layout (v2)
      description: Replaces the authenticated user's dashboard section layout.
      operationId: updateDashboardLayoutV2
      tags:
        - Dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - type
                  - enabled
                properties:
                  type:
                    type: string
                    enum:
                      - STATS
                      - RECENT_LINKS
                      - PINNED_LINKS
                      - COLLECTION
                  collectionId:
                    type: integer
                    nullable: true
                  enabled:
                    type: boolean
                  order:
                    type: integer
      responses:
        "200":
          description: Dashboard layout updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      links:
                        type: array
                        items:
                          $ref: "#/components/schemas/Link"
                      collectionLinks:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            $ref: "#/components/schemas/Link"
                      numberOfPinnedLinks:
                        type: integer
                      numberOfTags:
                        type: integer
                  message:
                    type: string
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/getFavicon:
    get:
      tags:
        - Favicon
      summary: Fetch a favicon for a URL
      description: Resolves a site origin from the provided URL, redirects to the canonical origin-based request when needed, and proxies a favicon image when available.
      parameters:
        - name: url
          in: query
          required: true
          description: The target page or origin URL.
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Favicon image retrieved successfully.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/x-icon:
              schema:
                type: string
                format: binary
        "204":
          description: No favicon could be resolved for the requested URL.
        "308":
          description: Redirect to the canonical origin-based favicon URL.
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/highlights:
    post:
      security:
        - bearerAuth: []
      tags:
        - Highlights
      summary: Create or update a highlight
      description: Creates a new highlight for the authenticated user, or updates an existing one matching the same offsets on the same link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - color
                - startOffset
                - endOffset
                - text
                - linkId
              properties:
                color:
                  type: string
                  maxLength: 50
                comment:
                  type: string
                  maxLength: 2048
                  nullable: true
                startOffset:
                  type: integer
                endOffset:
                  type: integer
                text:
                  type: string
                  maxLength: 2048
                linkId:
                  type: integer
      responses:
        "200":
          description: Highlight saved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      id:
                        type: integer
                      userId:
                        type: integer
                      linkId:
                        type: integer
                      color:
                        type: string
                      comment:
                        type: string
                        nullable: true
                      startOffset:
                        type: integer
                      endOffset:
                        type: integer
                      text:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/highlights/{id}:
    delete:
      security:
        - bearerAuth: []
      tags:
        - Highlights
      summary: Delete a highlight
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the highlight to delete.
          schema:
            type: integer
      responses:
        "200":
          description: Highlight deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/links:
    get:
      deprecated: true
      security:
        - bearerAuth: []
      tags:
        - Links
      summary: Retrieve a list of links
      description: Fetches a paginated list of links, with optional filtering and sorting options. **This endpoint is deprecated in favor of [`/api/v1/search`](https://docs.linkwarden.app/api/search-links).**
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
