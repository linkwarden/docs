          in: path
          required: true
          description: The ID of the user whose preferences should be updated.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                theme:
                  type: string
                  enum:
                    - dark
                    - light
                    - auto
                readableFontFamily:
                  type: string
                  maxLength: 100
                readableFontSize:
                  type: string
                  maxLength: 100
                readableLineHeight:
                  type: string
                  maxLength: 100
                readableLineWidth:
                  type: string
                  maxLength: 100
      responses:
        "200":
          description: User preferences updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      id:
                        type: integer
                      theme:
                        type: string
                      readableFontFamily:
                        type: string
                        nullable: true
                      readableFontSize:
                        type: string
                        nullable: true
                      readableLineHeight:
                        type: string
                        nullable: true
                      readableLineWidth:
                        type: string
                        nullable: true
                      dashboardSections:
                        type: array
                        items:
                          type: object
                      subscription:
                        type: object
                      parentSubscription:
                        type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/worker:
    get:
      security:
        - bearerAuth: []
      tags:
        - Worker
      summary: Get worker statistics
      description: Returns preservation and search indexing queue statistics for the server admin user.
      responses:
        "200":
          description: Worker statistics retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      link:
                        type: object
                        properties:
                          pending:
                            type: integer
                          done:
                            type: integer
                          failed:
                            type: integer
                      search:
                        type: object
                        properties:
                          pending:
                            type: integer
                          done:
                            type: integer
                  success:
                    type: boolean
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/worker/preservation:
    delete:
      security:
        - bearerAuth: []
      tags:
        - Worker
      summary: Reset preserved data in bulk
      description: Server-admin-only endpoint for clearing preserved files across all links or only links with broken archives.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum:
                    - allAndRePreserve
                    - allBroken
      responses:
        "200":
          description: Preservation reset started successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
